naftiko: "1.0.0-alpha1"

info:
  label: "Trimble Agriculture Data API"
  description: >-
    Trimble Agriculture Cloud API (PTxAg FarmENGAGE) for precision farming data management.
    Provides endpoints for organizations, farms, fields, crop zones, equipment activities,
    work orders, prescriptions, materials, boundaries, and imagery.
  tags:
    - Agriculture
    - Farming
    - Precision Agriculture
    - Field Management
    - Prescriptions
    - Equipment Activities
    - Work Orders
    - IoT
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      TRIMBLE_AG_ACCESS_TOKEN: TRIMBLE_AG_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: trimble-ag
      baseUri: https://cloud.api.trimble.com/Trimble-Ag-Software/externalApi/3.0
      description: "Trimble Agriculture Cloud REST API for precision farming data"
      authentication:
        type: bearer
        token: "{{TRIMBLE_AG_ACCESS_TOKEN}}"
      resources:
        - name: farms
          path: /organizations/{organizationId}/farms
          description: Farm management
          operations:
            - name: list-farms
              method: GET
              description: List farms for an organization
              inputParameters:
                - name: organizationId
                  in: path
                  type: string
                  required: true
                  description: Organization identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-farm
              method: GET
              description: Get farm details
              inputParameters:
                - name: organizationId
                  in: path
                  type: string
                  required: true
                - name: farmId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-farm
              method: POST
              description: Create a new farm
              inputParameters:
                - name: organizationId
                  in: path
                  type: string
                  required: true
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  address: "{{tools.address}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: fields
          path: /organizations/{organizationId}/farms/{farmId}/fields
          description: Field management
          operations:
            - name: list-fields
              method: GET
              description: List fields for a farm
              inputParameters:
                - name: organizationId
                  in: path
                  type: string
                  required: true
                - name: farmId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-field
              method: POST
              description: Create a new field with optional boundary
              inputParameters:
                - name: organizationId
                  in: path
                  type: string
                  required: true
                - name: farmId
                  in: path
                  type: string
                  required: true
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  boundary: "{{tools.boundary}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: crop-zones
          path: /organizations/{organizationId}/cropzones
          description: Crop zone management
          operations:
            - name: list-crop-zones
              method: GET
              description: List crop zones for an organization
              inputParameters:
                - name: organizationId
                  in: path
                  type: string
                  required: true
                - name: season
                  in: query
                  type: integer
                  required: false
                - name: fieldId
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: equipment-activities
          path: /organizations/{organizationId}/equipmentactivities
          description: Equipment activity data from precision ag displays
          operations:
            - name: list-equipment-activities
              method: GET
              description: List equipment activities (planting, spraying, harvesting, etc.)
              inputParameters:
                - name: organizationId
                  in: path
                  type: string
                  required: true
                - name: activityType
                  in: query
                  type: string
                  required: false
                - name: startDate
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-as-applied-data
              method: GET
              description: Download as-applied data for an equipment activity
              inputParameters:
                - name: organizationId
                  in: path
                  type: string
                  required: true
                - name: activityId
                  in: path
                  type: string
                  required: true
                - name: format
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: work-orders
          path: /organizations/{organizationId}/workorders
          description: Work order planning and assignment
          operations:
            - name: list-work-orders
              method: GET
              description: List work orders
              inputParameters:
                - name: organizationId
                  in: path
                  type: string
                  required: true
                - name: status
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-work-order
              method: POST
              description: Create a work order for farm operators
              inputParameters:
                - name: organizationId
                  in: path
                  type: string
                  required: true
              body:
                type: json
                data:
                  title: "{{tools.title}}"
                  cropZoneId: "{{tools.cropZoneId}}"
                  activityType: "{{tools.activityType}}"
                  scheduledDate: "{{tools.scheduledDate}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: prescriptions
          path: /organizations/{organizationId}/prescriptions
          description: Prescription file management
          operations:
            - name: list-prescriptions
              method: GET
              description: List prescriptions
              inputParameters:
                - name: organizationId
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-prescription
              method: POST
              description: Upload a prescription for variable-rate field application
              inputParameters:
                - name: organizationId
                  in: path
                  type: string
                  required: true
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  cropZoneId: "{{tools.cropZoneId}}"
                  materialType: "{{tools.materialType}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: trimble-ag-rest
      resources:
        - path: /v1/farms
          name: farms
          description: Farm management
          operations:
            - method: GET
              name: list-farms
              call: "trimble-ag.list-farms"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: trimble-ag-mcp
      transport: http
      tools:
        - name: list-farms
          description: List farms for an organization
          hints:
            readOnly: true
            openWorld: false
          call: "trimble-ag.list-farms"
          with:
            organizationId: "tools.organizationId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-equipment-activities
          description: List equipment activities from precision ag displays
          hints:
            readOnly: true
            openWorld: false
          call: "trimble-ag.list-equipment-activities"
          with:
            organizationId: "tools.organizationId"
            activityType: "tools.activityType"
          outputParameters:
            - type: object
              mapping: "$."
