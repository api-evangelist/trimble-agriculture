aid: trimble-agriculture
name: Trimble Agriculture
description: >-
  The Trimble Agriculture Cloud is an independent, brand-agnostic platform that connects infield devices and operational
  workflows to more efficiently execute crop production plans and collect robust agricultural datasets. The Trimble
  Agriculture API (now operating as PTxAg FarmENGAGE) provides REST APIs for farm setup, field boundaries, task records,
  work orders, prescriptions, equipment activities, crop zones, materials, and telematics. It enables third-party
  integrators to exchange as-applied data, send prescriptions to Trimble displays, and align field resources across
  precision agriculture systems. The platform serves over 180 million customer acres globally.
